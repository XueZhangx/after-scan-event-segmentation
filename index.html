<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>After Scan Event Segmentation</title>
<style>
  body{margin:0;background:#000;color:#fff;font-family:'Malgun Gothic', 'Apple SD Gothic Neo', Arial, sans-serif;overflow:hidden}
  #videoBox{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
  video { width: 96%; max-height: 96%; pointer-events: none !important; user-select: none !important; cursor: default !important; }
  #prompt{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:26px;text-align:center;line-height: 1.5; display:none;}
  #counter{position:fixed;top:20px;right:20px;font-size:24px}
  #help{position:fixed;bottom:20px;left:20px;font-size:14px;color:#ccc}
  #adjustHint{position:fixed;bottom:60px;left:20px;font-size:14px;color:#ccc;display:none}
  #descBox{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#222;padding:20px 30px;border-radius:8px;display:none;z-index:1000;}
  #descBox input{width:350px;font-size:18px;padding:6px 10px}
  #descBox button{margin-left:10px;padding:6px 12px;font-size:16px;cursor: pointer;}
  #consent{position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;z-index:2000;display:flex;align-items:center;justify-content:center; overflow-y: auto;}
  #completion{position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;z-index:2000;display:none;flex-direction:column;align-items:center;justify-content:center;}
  #starter { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #111; z-index: 1500; display: none; flex-direction: column; align-items: center; justify-content: center; }
  #starter select { padding: 10px; font-size: 16px; margin: 10px 0; border-radius: 5px; min-width: 350px; }
  #starter button { padding: 10px 20px; font-size: 18px; background: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer; }
  .input-group { margin: 20px 0; }
  .input-group label { display: block; margin-bottom: 8px; font-weight: bold; }
  .input-group input { padding: 10px; width: 100%; box-sizing: border-box; font-size: 16px; }
  .wait-warning { color: #FF9800; font-size: 20px; margin-bottom: 20px; font-weight: bold;}
  .success-msg { color: #4CAF50; font-size: 20px; margin-bottom: 20px; display: none; }
  #uploadStatus { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8); color: #4CAF50; padding: 10px 20px; border-radius: 5px; font-size: 14px; display: none; z-index: 3000; }
</style>
</head>
<body>

<div id="uploadStatus"></div>

<div id="consent">
  <div style="max-width: 800px; margin: 50px auto; padding: 30px; background: #222; border-radius: 10px; border: 1px solid #444;">
    <h2>이벤트 분할 연구 (Event Segmentation Study)</h2>
    <div class="input-group">
        <label for="participantName" style="color: #4CAF50;">성함 (Name):</label>
        <input type="text" id="participantName" placeholder="성함을 입력해주세요 (Enter your name)">
    </div>
    <button id="agreeBtn" style="padding: 12px 25px; font-size: 18px; background:#4CAF50; color:white; border:none;border-radius:5px;cursor:pointer;">동의 및 시작 (Confirm & Start)</button>
  </div>
</div>

<div id="starter">
    <h2>시작 구간 선택 (Select Start Point)</h2>
    <select id="startSelect"></select><br>
    <button id="realStartBtn">실험 시작 (Start Experiment)</button>
</div>

<div id="experiment" style="display: none;">
  <div id="prompt">로딩 중... (Loading)</div>
  <div id="counter">Events: 0</div>
  <div id="videoBox"><video id="v" controls style="display:none;"></video></div>
  <div id="help">Space=경계 표시 (사건 종료/시작)&nbsp;&nbsp; Enter=확정/제출&nbsp;&nbsp; ESC=취소</div>
  <div id="adjustHint">← → 조정 (Space=재생) (Enter=확정)</div>
  <div id="descBox">
    <label>사건 <span id="evNum"></span>에 대한 간단한 설명:<br>
      <input id="descInput" type="text" placeholder="예: 주인공이 방을 나간다">
    </label>
    <div style="margin-top: 10px;">
      <button id="okBtn">제출 (Submit)</button>
      <button id="cancelBtn" style="margin-left: 10px; background: #666; color:white;">취소 (Cancel)</button>
    </div>
  </div>
</div>

<div id="completion">
  <h2>참여해 주셔서 감사합니다!</h2>
  <div id="waitMsg" class="wait-warning">데이터 동기화 중입니다. 창을 닫지 말고 잠시만 기다려주세요... <span id="countdown">5</span></div>
  <div id="finalMsg" class="success-msg">✅ 데이터가 성공적으로 저장되었습니다. 이제 창을 닫으셔도 됩니다.</div>
</div>

<script>
const SELECTED_VIDEOS = [ 1, 2, 4, 6, 8, 9, 12, 14,15, 17, 18, 19, 20, 21, 26, 27];
const VIDEOS_PER_SESSION = 8;
const TOTAL_SESSIONS = 2;

const STORAGE_KEY_PROGRESS = 'seeg_kor_v8_progress';
const STORAGE_KEY_NAME = 'seeg_kor_v8_name';
const STORAGE_KEY_ALL_DATA = 'seeg_kor_v8_alldata';
const STORAGE_KEY_SESSION = 'seeg_kor_v8_session';
const STORAGE_KEY_VIDEO_ORDER = 'seeg_kor_v8_order';
const STORAGE_KEY_SESSION_START = 'seeg_kor_v8_session_start';

let currentSession = 1;
let videoOrder = [];
let sessionVideos = {1: [], 2: []};
let currentVideoIndexInSession = 0;
let isPracticeMode = false;
let currentEvents = [];
let sessionStartTime = null;
let isWaitingForNextSession = false;
let currentSessionEvents = [];

window.addEventListener('DOMContentLoaded', () => {
    const savedName = localStorage.getItem(STORAGE_KEY_NAME);
    if(savedName) document.getElementById('participantName').value = savedName;
    const savedProgress = localStorage.getItem(STORAGE_KEY_PROGRESS);
    if (savedProgress) {
        setTimeout(() => {
            if (confirm('이전에 진행하던 실험이 있습니다. 계속하시겠습니까?')) {
                document.getElementById('agreeBtn').click();
            }
        }, 500);
    }
});

function getParticipantID() {
    let name = document.getElementById('participantName').value.trim();
    if(!name) name = localStorage.getItem(STORAGE_KEY_NAME) || "Unknown_User";
    return name;
}

function shuffleArray(array) {
    const newArray = [...array];
    for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
    }
    return newArray;
}

function initializeRandomization() {
    const savedOrder = localStorage.getItem(STORAGE_KEY_VIDEO_ORDER);
    const savedSession = localStorage.getItem(STORAGE_KEY_SESSION);
    if (savedOrder && savedSession) {
        videoOrder = JSON.parse(savedOrder);
        currentSession = parseInt(savedSession);
        sessionVideos[1] = videoOrder.slice(0, 8);
        sessionVideos[2] = videoOrder.slice(8, 16);
    } else {
        videoOrder = shuffleArray(SELECTED_VIDEOS);
        sessionVideos[1] = videoOrder.slice(0, 8);
        sessionVideos[2] = videoOrder.slice(8, 16);
        localStorage.setItem(STORAGE_KEY_VIDEO_ORDER, JSON.stringify(videoOrder));
        localStorage.setItem(STORAGE_KEY_SESSION, '1');
        currentSession = 1;
    }
}

function showStarterMenu() {
    const starter = document.getElementById('starter');
    const startSelect = document.getElementById('startSelect');
    initializeRandomization();
    const savedProgress = localStorage.getItem(STORAGE_KEY_PROGRESS);
    startSelect.innerHTML = '';
    
    const opt0 = document.createElement('option');
    opt0.value = '0_0';
    opt0.textContent = "0. 처음부터 시작 (연습 영상 포함)";
    if (!savedProgress) opt0.selected = true;
    startSelect.appendChild(opt0);
    
    const sep = document.createElement('option');
    sep.disabled = true; sep.textContent = "──────────────────";
    startSelect.appendChild(sep);
    
    for(let i = 0; i < 8; i++) {
        const opt = document.createElement('option');
        opt.value = `1_${i}`; opt.textContent = `Session 1 - 영상 ${i+1}`;
        if (savedProgress && JSON.parse(savedProgress).session === 1 && JSON.parse(savedProgress).videoIndex === i) opt.selected = true;
        startSelect.appendChild(opt);
    }
    
    startSelect.appendChild(sep.cloneNode(true));
    
    for(let i = 0; i < 8; i++) {
        const opt = document.createElement('option');
        opt.value = `2_${i}`; opt.textContent = `Session 2 - 영상 ${i+1}`;
        if (savedProgress && JSON.parse(savedProgress).session === 2 && JSON.parse(savedProgress).videoIndex === i) opt.selected = true;
        startSelect.appendChild(opt);
    }
    
    starter.style.display = 'flex';
}

document.getElementById('agreeBtn').addEventListener('click', function() {
    const name = document.getElementById('participantName').value.trim();
    if(!name) { alert("이름을 입력해주세요."); return; }
    localStorage.setItem(STORAGE_KEY_NAME, name);
    document.getElementById('consent').style.display = 'none';
    showStarterMenu();
});

document.getElementById('realStartBtn').addEventListener('click', function() {
    const val = document.getElementById('startSelect').value;
    let session, index, practice = false;
    if (val === '0_0') { session = 1; index = 0; practice = true; } 
    else { [session, index] = val.split('_').map(Number); }
    
    currentSession = session;
    currentVideoIndexInSession = index;
    isPracticeMode = practice;
    isWaitingForNextSession = false;
    currentSessionEvents = []; 
    
    sessionStartTime = Date.now();
    localStorage.setItem(STORAGE_KEY_SESSION_START, sessionStartTime.toString());
    localStorage.setItem(STORAGE_KEY_SESSION, currentSession.toString());
    
    document.getElementById('starter').style.display = 'none';
    document.getElementById('experiment').style.display = 'block';
    
    initializeExperiment();
});

function initializeExperiment() {
    let evtCnt = 0;
    let fineTuning = false;
    let isTransitioning = false;

    const v = document.getElementById('v');
    const prompt = document.getElementById('prompt');
    const counter = document.getElementById('counter');
    const descBox = document.getElementById('descBox');
    const descInput = document.getElementById('descInput');
    const evNumSpan = document.getElementById('evNum');
    const adjustHint = document.getElementById('adjustHint');

    loadNext();

    function loadNext() {
        isTransitioning = false;
        
        if (isPracticeMode) {
            isPracticeMode = false;
            v.src = 'practice.mp4';
            prompt.innerHTML = '<span style="color:#4CAF50;">[연습 단계]</span><br>아무 키나 눌러 시작하세요.';
            v.style.display = 'none';
            prompt.style.display = 'block';
            currentEvents = []; evtCnt = 0; counter.textContent = 'Events: 0';
            return;
        }
        
        if (currentVideoIndexInSession >= VIDEOS_PER_SESSION) {
            if (currentSession === TOTAL_SESSIONS) { finishAll(); return; }
            completeCurrentSession(); return;
        }

        localStorage.setItem(STORAGE_KEY_PROGRESS, JSON.stringify({ session: currentSession, videoIndex: currentVideoIndexInSession, timestamp: Date.now() }));

        const videoNum = sessionVideos[currentSession][currentVideoIndexInSession];
        v.src = `v${videoNum}.mp4`;
        
        prompt.innerHTML = `세션 ${currentSession} - 영상 ${currentVideoIndexInSession + 1} / ${VIDEOS_PER_SESSION}<br>시작하려면 아무 키나 누르세요.`;
        v.style.display = 'none';
        prompt.style.display = 'block';
        
        currentEvents = []; evtCnt = 0; counter.textContent = 'Events: 0';
        fineTuning = false;
    }

    async function completeCurrentSession() {
        const sessionEndTime = Date.now();
        const sessionStart = parseInt(localStorage.getItem(STORAGE_KEY_SESSION_START)) || sessionEndTime;
        const sessionDuration = Math.round((sessionEndTime - sessionStart) / 1000);
        
        await uploadSessionSummary(currentSession, currentSessionEvents, sessionDuration);
        
        currentSession++;
        currentVideoIndexInSession = 0;
        localStorage.setItem(STORAGE_KEY_SESSION, currentSession.toString());
        localStorage.setItem(STORAGE_KEY_SESSION_START, Date.now().toString());
        
        currentSessionEvents = [];
        isWaitingForNextSession = true;
        
        prompt.innerHTML = `<span style="color:#4CAF50;">[Session ${currentSession-1} 완료!]</span><br><br>
                            소요 시간: ${formatDuration(sessionDuration)}<br>
                            ${VIDEOS_PER_SESSION}개 영상 완료<br><br>
                            Session ${currentSession}를 시작하려면 아무 키나 누르세요.`;
        v.style.display = 'none';
        prompt.style.display = 'block';
    }

    function formatDuration(seconds) {
        const mins = Math.floor(seconds / 60); const secs = seconds % 60;
        return `${mins}분 ${secs}초`;
    }

    function pauseAndFineTune() {
        if (fineTuning) {
            fineTuning = false; adjustHint.style.display = 'none';
            v.play().catch(e => console.log('Play interrupted'));
        } else {
            v.pause(); fineTuning = true; adjustHint.style.display = 'block';
        }
    }

    function confirmEnd() {
        if (!fineTuning) return;
        fineTuning = false; adjustHint.style.display = 'none';
        
        const videoId = v.src.includes('practice') ? 'practice' : sessionVideos[currentSession][currentVideoIndexInSession];
        currentEvents.push({ vid: videoId, session: currentSession, ev: evtCnt + 1, time: v.currentTime, desc: '' });
        
        evtCnt++; counter.textContent = 'Events: ' + evtCnt;
        descInput.value = ''; evNumSpan.textContent = evtCnt;
        descBox.style.display = 'block'; descInput.focus();
    }

    async function saveDesc() {
        if (isTransitioning) return;
        const txt = descInput.value.trim();
        
        if (!txt) { alert('설명을 입력해주세요.'); descInput.focus(); return; }
        const validCharCount = txt.replace(/\s+/g, '').length;
        if (validCharCount < 6) {
            alert(`설명은 공백 제외 최소 6글자 이상이어야 합니다. (현재: ${validCharCount}글자)`);
            descInput.focus(); return;
        }
        
        const lastIdx = currentEvents.length - 1;
        if (lastIdx >= 0) currentEvents[lastIdx].desc = txt;
        descBox.style.display = 'none';
        
        if (v.ended) {
            isTransitioning = true;
            prompt.innerHTML = '데이터 저장 중입니다...';
            prompt.style.display = 'block';
            v.style.display = 'none';
            
            const eventsToStore = [...currentEvents];
            currentSessionEvents.push(...eventsToStore);
            
            const videoId = currentEvents[0]?.vid || 'unknown';
            await uploadVideo(videoId, eventsToStore, currentSession, currentVideoIndexInSession);
            
            if (v.src.includes('practice')) {
                currentSession = 1; currentVideoIndexInSession = 0; currentSessionEvents = []; loadNext();
            } else {
                if (currentVideoIndexInSession === VIDEOS_PER_SESSION - 1) {
                    currentVideoIndexInSession++; loadNext();
                } else {
                    currentVideoIndexInSession++; loadNext();
                }
            }
        } else {
            v.play().catch(e => console.log('Play interrupted'));
        }
    }

    function cancelDescription() {
        descBox.style.display = 'none';
        currentEvents.pop(); evtCnt--; counter.textContent = 'Events: ' + Math.max(0, evtCnt);
        if (v.src.includes('practice') && v.ended) {
            currentSession = 1; currentVideoIndexInSession = 0; currentSessionEvents = []; loadNext();
        } else {
            prompt.innerHTML = '취소되었습니다.<br>계속하려면 아무 키나 누르세요.';
            prompt.style.display = 'block'; v.style.display = 'none';
        }
    }

    async function finishAll() {
        const sessionEndTime = Date.now();
        const sessionStart = parseInt(localStorage.getItem(STORAGE_KEY_SESSION_START)) || sessionEndTime;
        const sessionDuration = Math.round((sessionEndTime - sessionStart) / 1000);
        
        await uploadSessionSummary(2, currentSessionEvents, sessionDuration);
        
        document.getElementById('experiment').style.display = 'none';
        document.getElementById('completion').style.display = 'flex';
        
        await uploadFinalSummary();
        localStorage.removeItem(STORAGE_KEY_PROGRESS);
        
        let timeLeft = 5;
        const timer = setInterval(() => {
            timeLeft--; document.getElementById('countdown').textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                document.getElementById('waitMsg').style.display = 'none';
                document.getElementById('finalMsg').style.display = 'block';
            }
        }, 1000);
    }

    document.getElementById('okBtn').onclick = saveDesc;
    document.getElementById('cancelBtn').onclick = cancelDescription;

    document.onkeydown = (e) => {
        if (document.getElementById('experiment').style.display === 'none') return;
        if (document.activeElement.id === 'descInput') {
            if (e.code === 'Enter') { e.preventDefault(); saveDesc(); }
            if (e.code === 'Escape') { e.preventDefault(); cancelDescription(); }
            return;
        }
        if (v.style.display === 'none' && prompt.style.display !== 'none') {
            if (isTransitioning) return;
            prompt.style.display = 'none'; v.style.display = 'block';
            if (isWaitingForNextSession) { isWaitingForNextSession = false; loadNext(); } 
            else { if (!v.src || v.src === '') loadNext(); else v.play().catch(e => console.log('Play interrupted')); }
            return;
        }
        if (v.style.display !== 'none') {
            if (e.code === 'Space') { e.preventDefault(); pauseAndFineTune(); return; }
            if (fineTuning && v.paused) {
                if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
                    e.preventDefault(); v.currentTime += e.code === 'ArrowLeft' ? -1 : 1;
                    v.currentTime = Math.max(0, Math.min(v.duration, v.currentTime)); return;
                }
                if (e.code === 'Enter') { e.preventDefault(); confirmEnd(); return; }
            }
        }
    };

    v.onended = () => {
        const videoId = v.src.includes('practice') ? 'practice' : sessionVideos[currentSession][currentVideoIndexInSession];
        currentEvents.push({ vid: videoId, session: currentSession, ev: evtCnt + 1, time: v.duration, desc: '[auto-end]' });
        evtCnt++; counter.textContent = 'Events: ' + evtCnt;
        descInput.value = ''; evNumSpan.textContent = evtCnt;
        descBox.style.display = 'block'; descInput.focus();
    };
}

// ====== 4. PURE JSON API Upload Functions ======

function getGlobalData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY_ALL_DATA)) || []; } catch { return []; } }

function appendToDisk(events) {
    const all = getGlobalData(); all.push(...events);
    localStorage.setItem(STORAGE_KEY_ALL_DATA, JSON.stringify(all));
}

// 将前端数据直接封装成 JSON 丢给我们的新后端接口
async function sendToNetlifyFunction(payload) {
    try {
        const response = await fetch('/api/save-data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        return response.ok;
    } catch (e) {
        console.error("Function Upload Error:", e);
        return false;
    }
}

async function uploadVideo(videoId, events, session, position) {
    appendToDisk(events);
    const pid = getParticipantID();
    
    const payload = {
        prolific_pid: pid,
        study_id: 'after_scan_event_segmentation',
        upload_type: videoId === 'practice' ? 'practice' : 'main',
        session_id: videoId === 'practice' ? `sess_${pid}_practice` : `sess_${pid}_session${session}`,
        video_index: videoId.toString(),
        video_position_in_session: videoId === 'practice' ? 'practice' : (position + 1).toString(),
        events: events,
        completion_time: new Date().toISOString()
    };

    const success = await sendToNetlifyFunction(payload);
    if(success) showUploadStatus(`✅ 영상 ${videoId} 데이터 저장됨`);
    else showUploadStatus(`❌ 저장 실패 (Netlify 서버 에러)`, true);
}

async function uploadSessionSummary(sessionNum, sessionData, durationSeconds) {
    const pid = getParticipantID();
    const payload = {
        prolific_pid: pid,
        study_id: 'after_scan_event_segmentation',
        upload_type: 'session_summary',
        session_id: `sess_${pid}_session${sessionNum}_summary`,
        session_number: sessionNum,
        session_duration_seconds: durationSeconds,
        total_events_recorded: sessionData.length,
        events: sessionData,
        completion_time: new Date().toISOString()
    };
    await sendToNetlifyFunction(payload);
    showUploadStatus(`✅ Session ${sessionNum} 요약본 전송 완료!`);
}

async function uploadFinalSummary() {
    const allData = getGlobalData();
    const pid = getParticipantID();
    const payload = {
        prolific_pid: pid,
        study_id: 'after_scan_event_segmentation',
        upload_type: 'final_all_data',
        session_id: `sess_${pid}_final`,
        total_events_recorded: allData.length,
        events: allData,
        completion_time: new Date().toISOString()
    };
    const success = await sendToNetlifyFunction(payload);
    if(success) console.log("✅ Final MEGA summary saved to Blobs");
}

function showUploadStatus(msg, isError = false) {
    const el = document.getElementById('uploadStatus');
    el.style.display = 'block'; el.style.color = isError ? '#FF5252' : '#4CAF50';
    el.textContent = msg; setTimeout(() => el.style.display = 'none', 2000);
}
</script>
</body>
</html>
